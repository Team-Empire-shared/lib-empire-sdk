name: Regenerate Types from OpenAPI

on:
  workflow_dispatch:
    inputs:
      api_url:
        description: "BOS API URL to fetch OpenAPI spec from"
        required: false
        default: "https://api.empireoe.com"

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - run: npm ci

      - name: Fetch OpenAPI spec and generate types
        run: |
          curl -sf "${{ inputs.api_url }}/openapi.json" -o openapi.json
          npx openapi-typescript openapi.json -o src/generated.ts
          rm -f openapi.json

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet src/generated.ts && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/generated.ts
          git commit -m "chore: regenerate types from OpenAPI spec"
          git push
